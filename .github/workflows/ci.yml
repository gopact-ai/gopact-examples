name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gopact-examples
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: gopact-examples
      - name: reject private development documents
        shell: bash
        run: |
          files=$(git ls-files 'doc/**' 'docs/**')
          test -z "$files" || {
            printf 'private development documents are tracked:\n%s\n' "$files"
            exit 1
          }
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.27.0-rc.2'
          cache-dependency-path: gopact-examples/go.sum
      - run: test -z "$(gofmt -l .)"
      - run: GOWORK=off go mod tidy -diff
      - run: GOWORK=off go test -count=1 ./...
      - run: GOWORK=off go test -race -count=1 ./...
      - run: GOWORK=off go vet ./...
      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
      - run: GOWORK=off govulncheck ./...

  source-compatibility:
    uses: ./.github/workflows/source-compatibility.yml
    with:
      core_ref: main
      ext_ref: main
      examples_ref: ${{ github.event.pull_request.head.sha || github.sha }}
