name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: source/gopact-examples
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: source/gopact-examples
      - name: reject private development documents
        shell: bash
        run: |
          files=$(git ls-files 'doc/**' 'docs/**')
          test -z "$files" || {
            printf 'private development documents are tracked:\n%s\n' "$files"
            exit 1
          }
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: gopact-ai/gopact
          path: source/gopact
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: gopact-ai/gopact-ext
          path: source/gopact-ext
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.27.0-rc.2'
          cache-dependency-path: source/gopact-examples/go.sum
      - name: create coordinated source workspace
        working-directory: source
        run: go work init ./gopact ./gopact-ext ./gopact-ext/stores ./gopact-examples
      - run: test -z "$(gofmt -l .)"
      - run: go mod tidy -diff
      - run: go test -count=1 ./...
      - run: go test -race -count=1 ./...
      - run: go vet ./...
      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
      - run: govulncheck ./...
