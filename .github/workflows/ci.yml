name: ci

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/gopact-ai/*
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.11'
          cache-dependency-path: go.sum
      - name: Install tools
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.8.0
      - name: Configure private module access
        run: |
          if [ -n "${GOPACT_GITHUB_TOKEN:-}" ]; then
            git config --global url."https://x-access-token:${GOPACT_GITHUB_TOKEN}@github.com/gopact-ai/".insteadOf "https://github.com/gopact-ai/"
          fi
        env:
          GOPACT_GITHUB_TOKEN: ${{ secrets.GOPACT_GITHUB_TOKEN || github.token }}
      - name: Check whitespace
        run: git diff --check
      - name: Public readiness
        run: ./scripts/public-readiness-check.sh
      - name: Check module tidiness
        run: |
          go mod tidy
          git diff --exit-code
      - name: Test
        run: go test -count=1 ./...
      - name: Race
        run: go test -race -count=1 ./...
      - name: Vet
        run: go vet ./...
      - name: Lint
        run: golangci-lint run ./...
      - name: Coverage
        run: go test -coverprofile=coverage.out ./...
      - name: Security
        run: govulncheck ./...
